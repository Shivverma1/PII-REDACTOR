<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PII Redaction Tool</title>
<style>
  :root {
    --bg: #0f1115; --panel: #181b22; --border: #2a2f3a;
    --text: #e6e8ee; --muted: #9aa3b2; --accent: #5eead4; --danger: #f87171;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font: 16px/1.6 system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text);
    max-width: 820px; margin: 0 auto; padding: 3rem 1.25rem;
  }
  h1 { font-size: 1.6rem; letter-spacing: -0.02em; }
  p.sub { color: var(--muted); margin: 0.4rem 0 2rem; }
  .panel {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.5rem; margin-bottom: 1.25rem;
  }
  .drop {
    border: 2px dashed var(--border); border-radius: 10px;
    padding: 2.2rem 1rem; text-align: center; cursor: pointer;
    transition: border-color .15s;
  }
  .drop:hover, .drop.over { border-color: var(--accent); }
  .drop input { display: none; }
  .row { display: flex; gap: 1rem; align-items: center; margin-top: 1.1rem; flex-wrap: wrap; }
  label.opt { color: var(--muted); font-size: .92rem; display: flex; gap: .45rem; align-items: center; }
  button {
    background: var(--accent); color: #06251f; border: 0; border-radius: 8px;
    padding: .6rem 1.4rem; font-weight: 600; font-size: 1rem; cursor: pointer;
  }
  button:disabled { opacity: .45; cursor: not-allowed; }
  .ghost { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  table { width: 100%; border-collapse: collapse; margin-top: .6rem; }
  th, td { text-align: left; padding: .4rem .6rem; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; font-size: .85rem; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  th.num { text-align: right; }
  .stat { display: inline-block; margin-right: 1.6rem; }
  .stat b { font-size: 1.35rem; }
  .stat span { color: var(--muted); font-size: .85rem; display: block; }
  #status { color: var(--muted); }
  #status.err { color: var(--danger); }
  .hidden { display: none; }
  .spinner {
    display: inline-block; width: 14px; height: 14px; margin-right: .5rem;
    border: 2px solid var(--muted); border-top-color: transparent;
    border-radius: 50%; animation: spin .8s linear infinite; vertical-align: -2px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <h1>PII Redaction Tool</h1>
  <p class="sub">Upload a PDF or text document &mdash; every name, e-mail, phone number,
  company, address and identifier is replaced with a consistent fake.
  Nothing is stored on the server.</p>

  <div class="panel">
    <label class="drop" id="drop">
      <input type="file" id="file" accept=".pdf,.txt">
      <span id="dropLabel">Drop a .pdf / .txt here, or click to choose</span>
    </label>
    <div class="row">
      <button id="go" disabled>Redact</button>
      <label class="opt">
        <input type="checkbox" id="ner" checked>
        Use NER for names &amp; companies (slower, far better recall)
      </label>
      <span id="status"></span>
    </div>
  </div>

  <div class="panel hidden" id="results">
    <div>
      <span class="stat"><b id="sRedactions">0</b><span>redactions</span></span>
      <span class="stat"><b id="sUnique">0</b><span>unique values</span></span>
      <span class="stat"><b id="sChars">0</b><span>characters</span></span>
      <span class="stat"><b id="sLeft">0</b><span>residual leftovers</span></span>
    </div>
    <table id="byType"><thead><tr><th>PII type</th><th class="num">occurrences</th></tr></thead><tbody></tbody></table>
    <div class="row">
      <button id="dlText">Download redacted text</button>
      <button id="dlMap" class="ghost">Download mapping (JSON)</button>
    </div>
  </div>

<script>
const $ = (id) => document.getElementById(id);
let picked = null, lastResult = null;

const drop = $("drop");
drop.addEventListener("dragover", (e) => { e.preventDefault(); drop.classList.add("over"); });
drop.addEventListener("dragleave", () => drop.classList.remove("over"));
drop.addEventListener("drop", (e) => {
  e.preventDefault(); drop.classList.remove("over");
  if (e.dataTransfer.files.length) setFile(e.dataTransfer.files[0]);
});
$("file").addEventListener("change", (e) => { if (e.target.files.length) setFile(e.target.files[0]); });

function setFile(f) {
  picked = f;
  $("dropLabel").textContent = `${f.name} (${(f.size / 1048576).toFixed(1)} MB)`;
  $("go").disabled = false;
}

$("go").addEventListener("click", async () => {
  const form = new FormData();
  form.append("file", picked);
  $("go").disabled = true;
  $("results").classList.add("hidden");
  $("status").className = "";
  $("status").innerHTML = '<span class="spinner"></span>Redacting&hellip; large documents take up to a minute';
  try {
    const url = "/api/redact?use_ner=" + $("ner").checked;
    const response = await fetch(url, { method: "POST", body: form });
    if (!response.ok) throw new Error((await response.json()).detail || response.statusText);
    lastResult = await response.json();
    render(lastResult);
    $("status").textContent = "";
  } catch (err) {
    $("status").className = "err";
    $("status").textContent = "Failed: " + err.message;
  } finally {
    $("go").disabled = false;
  }
});

function render(r) {
  $("sRedactions").textContent = r.redactions.toLocaleString();
  $("sUnique").textContent = r.unique_values.toLocaleString();
  $("sChars").textContent = r.characters.toLocaleString();
  $("sLeft").textContent = r.residual_leftovers;
  const body = $("byType").querySelector("tbody");
  body.innerHTML = "";
  for (const [type, count] of Object.entries(r.by_type)) {
    body.insertAdjacentHTML("beforeend",
      `<tr><td>${type}</td><td class="num">${count.toLocaleString()}</td></tr>`);
  }
  $("results").classList.remove("hidden");
}

function download(name, text, mime) {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([text], { type: mime }));
  a.download = name;
  a.click();
  URL.revokeObjectURL(a.href);
}
$("dlText").addEventListener("click", () =>
  download((lastResult.filename || "document").replace(/\.\w+$/, "") + ".redacted.txt",
           lastResult.redacted_text, "text/plain"));
$("dlMap").addEventListener("click", () =>
  download("pii_mapping.json", JSON.stringify(lastResult.mapping, null, 2), "application/json"));
</script>
</body>
</html>
